<div class="custom-modal-container">
  <h4 mat-dialog-title class="modal-title">{{ data.titulo }}</h4>

  <div class="divider"></div>

  <mat-dialog-content class="modal-body">
    <p>{{ data.mensagem }}</p>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="modal-actions">
    <button mat-button (click)="cancelar()" class="btn-flat">
      Cancelar
    </button>
    <button mat-raised-button (click)="confirmar()" class="btn-sharp">
      Confirmar
    </button>
  </mat-dialog-actions>
</div>
